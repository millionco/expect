name: Test Dogfood

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test-dogfood:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code
        run: pnpm add -g @anthropic-ai/claude-code

      - name: Smoke test Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --version
          echo "What is 1+1?" | claude -p --max-turns 1

      - name: Install ttyd
        run: |
          sudo apt-get update && sudo apt-get install -y ttyd
          sudo systemctl stop ttyd || true
          sudo systemctl disable ttyd || true

      - name: Start and wait for website server
        run: |
          cd apps/website
          npx next start -p 3000 > /tmp/next-server.log 2>&1 &
          SERVER_PID=$!
          sleep 3
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "::error::Next.js server crashed on startup:"
            cat /tmp/next-server.log
            exit 1
          fi
          pnpm dlx wait-on http-get://localhost:3000 --timeout 60000 || {
            echo "::error::Server timed out. Logs:"
            cat /tmp/next-server.log
            exit 1
          }

      - name: Start CLI in web terminal
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ttyd -p 7681 --writable node apps/cli/dist/index.js > /tmp/ttyd.log 2>&1 &
          TTYD_PID=$!
          sleep 3
          if ! kill -0 $TTYD_PID 2>/dev/null; then
            echo "::error::ttyd crashed on startup:"
            cat /tmp/ttyd.log
            exit 1
          fi
          curl -sf http://localhost:7681 > /dev/null || {
            echo "::error::ttyd failed to start. Logs:"
            cat /tmp/ttyd.log
            exit 1
          }

      - name: Run expect dogfood test
        id: dogfood
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ACTIONS: ""
        run: |
          mkdir -p /tmp/expect-results
          node apps/cli/dist/index.js --ci --output json --timeout 900000 -m \
            "Visit http://localhost:7681 which shows the expect CLI running in a web terminal (xterm.js). \
            This is an interactive terminal UI for a browser testing tool. Test the FULL workflow: \
            (1) Verify the TUI renders with a logo/header and input prompt. \
            (2) Type a test instruction like 'test the homepage at http://localhost:3000' into the input field and submit it. \
            (3) The CLI should generate a test plan â€” verify the plan review screen appears with test steps. \
            (4) Approve the plan (press Enter or the confirm key). \
            (5) Watch the execution progress â€” verify steps are being executed with status updates. \
            (6) Wait for completion and verify the results screen shows pass/fail outcomes. \
            Note: This is a terminal rendered in xterm.js. Type by clicking the terminal and using keyboard input." \
            > /tmp/expect-results/dogfood.json 2>/tmp/expect-results/dogfood.stderr.txt

      - name: Validate dogfood results
        if: always()
        run: bash .github/scripts/validate-scenario.sh /tmp/expect-results/dogfood.json dogfood

      - name: Upload session recording
        id: recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-session-recording
          path: /tmp/expect-replays/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload dogfood results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-results
          path: /tmp/expect-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_ID="${{ steps.recording.outputs.artifact-id }}"
          COMMENT_MARKER="<!-- expect-dogfood-result -->"

          if [ -f /tmp/expect-results/dogfood.json ] && jq -e . /tmp/expect-results/dogfood.json > /dev/null 2>&1; then
            STATUS=$(jq -r '.status' /tmp/expect-results/dogfood.json)
            TITLE=$(jq -r '.title' /tmp/expect-results/dogfood.json)
            DURATION_MS=$(jq -r '.duration_ms' /tmp/expect-results/dogfood.json)
            SUMMARY=$(jq -r '.summary' /tmp/expect-results/dogfood.json)
            DURATION_S=$((DURATION_MS / 1000))

            if [ "$STATUS" = "passed" ]; then
              STATUS_ICON="âś…"
            else
              STATUS_ICON="âťŚ"
            fi

            STEP_TABLE="| Step | Status | Duration |"$'\n'"| --- | --- | --- |"
            STEP_COUNT=$(jq '.steps | length' /tmp/expect-results/dogfood.json)
            for i in $(seq 0 $((STEP_COUNT - 1))); do
              STEP_TITLE=$(jq -r ".steps[$i].title" /tmp/expect-results/dogfood.json)
              STEP_STATUS=$(jq -r ".steps[$i].status" /tmp/expect-results/dogfood.json)
              STEP_DURATION=$(jq -r ".steps[$i].duration_ms // \"â€”\"" /tmp/expect-results/dogfood.json)
              if [ "$STEP_DURATION" != "â€”" ]; then
                STEP_DURATION="$((STEP_DURATION / 1000))s"
              fi
              case "$STEP_STATUS" in
                passed)  STEP_ICON="âś…" ;;
                failed)  STEP_ICON="âťŚ" ;;
                skipped) STEP_ICON="âŹ­ď¸Ź" ;;
                *)       STEP_ICON="â¬ś" ;;
              esac
              STEP_TABLE+=$'\n'"| ${STEP_TITLE} | ${STEP_ICON} ${STEP_STATUS} | ${STEP_DURATION} |"
            done

            BODY="${COMMENT_MARKER}"
            BODY+=$'\n'"## ${STATUS_ICON} Dogfood Test: ${STATUS}"
            BODY+=$'\n\n'"**${TITLE}** â€” ${DURATION_S}s"
            BODY+=$'\n\n'"${STEP_TABLE}"
            BODY+=$'\n\n'"**Summary:** ${SUMMARY}"
          else
            if [ "${{ steps.dogfood.outcome }}" = "success" ]; then
              BODY="${COMMENT_MARKER}"$'\n'"## âš ď¸Ź Dogfood Test: completed but no valid JSON output"
            else
              BODY="${COMMENT_MARKER}"$'\n'"## âťŚ Dogfood Test: failed"
            fi

            if [ -f /tmp/expect-results/dogfood.stderr.txt ]; then
              STDERR=$(tail -50 /tmp/expect-results/dogfood.stderr.txt)
              BODY+=$'\n\n'"<details><summary>stderr output</summary>"$'\n\n'"\`\`\`"$'\n'"${STDERR}"$'\n'"\`\`\`"$'\n'"</details>"
            fi
          fi

          BODY+=$'\n\n'"[Workflow run #${{ github.run_number }}](${RUN_URL})"

          if [ -n "$ARTIFACT_ID" ]; then
            BODY+=$'\n\n'"đź“Ž [Download session recording](${RUN_URL}/artifacts/${ARTIFACT_ID})"
          fi

          EXISTING_COMMENT=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | contains(\"${COMMENT_MARKER}\")) | .id" | head -1)

          if [ -n "$EXISTING_COMMENT" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"
          fi

      - name: Print ttyd logs
        if: always()
        run: |
          echo "=== ttyd logs ==="
          if [ -f /tmp/ttyd.log ]; then cat /tmp/ttyd.log; else echo "No ttyd logs"; fi

      - name: Print expect debug logs
        if: always()
        run: |
          if [ -f .expect/logs.md ]; then
            tail -n 240 .expect/logs.md
          else
            echo "No .expect/logs.md file found"
          fi

      - name: Print dogfood stderr
        if: always()
        run: |
          if [ -f /tmp/expect-results/dogfood.stderr.txt ]; then
            cat /tmp/expect-results/dogfood.stderr.txt
          else
            echo "No stderr output"
          fi

      - name: Fail if dogfood test failed
        if: steps.dogfood.outcome == 'failure'
        run: |
          echo "::error::Dogfood test failed â€” see logs and artifacts above"
          exit 1
