name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - name: Install dependencies
        run: vp install --frozen-lockfile
      - name: Build
        run: vp build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: vp run --filter @browser-tester/browser test
